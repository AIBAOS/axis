# Axis 项目配置文件
# 此文件包含 JWT 服务器、数据库和应用配置
# 
# 安全警告：生产环境请使用环境变量覆盖敏感配置：
#   - JWT_SECRET_KEY: JWT 密钥（至少 32 字符）
#   - DATABASE_PATH: 数据库路径

[jwt]
# 生产环境请设置环境变量 JWT_SECRET_KEY
secret_key = ""  # 留空，强制使用环境变量
issuer = "axis-nas"
audience = "axis-nas-users"
expiration_minutes = 60
refresh_enabled = false

[database]
path = "NAS.db"
max_connections = 10

[server]
host = "0.0.0.0"
port = 8080